name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

defaults:
  run:
    working-directory: new_implementation

# Force Node 24 runtime on JS actions whose latest tag is still Node 20
# (currently actions/upload-artifact). The forced default lands 2026-06-02;
# this opts in early so the deprecation banner doesn't fire and any
# incompatibility surfaces here, not on the day GitHub flips the switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: diplomacy_user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: diplomacy_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: new_implementation/requirements.txt

      - name: Install system libraries (Cairo for cairosvg)
        run: sudo apt-get update && sudo apt-get install -y libcairo2 libcairo2-dev
        working-directory: .

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check src/ --output-format=github

      - name: Run database migrations
        env:
          SQLALCHEMY_DATABASE_URL: postgresql+psycopg2://diplomacy_user:password@localhost:5432/diplomacy_db
        run: alembic upgrade head

      - name: Run test suite
        env:
          SQLALCHEMY_DATABASE_URL: postgresql+psycopg2://diplomacy_user:password@localhost:5432/diplomacy_db
          PYTHONPATH: src
        run: pytest tests/ -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit

      - name: Run safety check (informational)
        run: safety check -r requirements.txt
        continue-on-error: true

      - name: Run bandit security check (informational)
        run: bandit -r src/ -f json -o bandit-report.json
        continue-on-error: true

      - name: Upload bandit results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: bandit-report
          path: new_implementation/bandit-report.json
          if-no-files-found: ignore
